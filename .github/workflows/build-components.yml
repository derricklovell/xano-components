name: Build Components

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build components
        run: npm run build

      - name: Check for changes
        id: git-check
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "chore: build components [skip ci]"
          git push

      - name: Update component in Xano
        run: |
          # Wait for GitHub CDN to propagate (jsDelivr)
          sleep 5
          
          # Call Xano API to update component
          curl -X POST "${{ secrets.XANO_API_URL }}/o-B1LTj7/update/component" \
            -H "Content-Type: application/json" \
            -d '{
              "component_id": 36,
              "repo_id": 2,
              "js_path": "order-again/order-again-component.js",
              "css_path": "order-again/order-again-component.css",
              "branch": "main"
            }'